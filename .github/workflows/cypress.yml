name: Cypress Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.18.2

      - name: Install dependencies
        run: npm install

      - name: Wake up app
        run: curl -I https://automation-engineer-test.onrender.com || true

      - name: Run Cypress tests
        run: npx cypress run
        env:
          CYPRESS_REQUESTER_EMAIL: ${{ secrets.REQUESTER_EMAIL }}
          CYPRESS_REQUESTER_PASSWORD: ${{ secrets.REQUESTER_PASSWORD }}
          CYPRESS_REVIEWER_EMAIL: ${{ secrets.REVIEWER_EMAIL }}
          CYPRESS_REVIEWER_PASSWORD: ${{ secrets.REVIEWER_PASSWORD }}
          CYPRESS_CLAIMER_EMAIL: ${{ secrets.CLAIMER_EMAIL }}
          CYPRESS_CLAIMER_PASSWORD: ${{ secrets.CLAIMER_PASSWORD }}